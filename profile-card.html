<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily Comin | Social Media</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── Phone shell ── */
    .phone-wrapper {
      position: relative;
      width: 300px;
    }

    /* ── Card ── */
    .card {
      width: 300px;
      height: 420px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    /* ── Background photo ── */
    .card__bg {
      position: absolute;
      inset: 0;
      background:
        /* gradiente circular partindo do centro-baixo */
        radial-gradient(
          ellipse 140% 80% at 50% 110%,
          rgba(20, 18, 50, 1)    0%,
          rgba(20, 18, 50, 0.95) 30%,
          rgba(20, 18, 50, 0.75) 50%,
          rgba(20, 18, 50, 0.3)  70%,
          transparent            100%
        );
      z-index: 1;
    }

    /* Replace src below with your own photo */
    .card__photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    /* ── Snowflake / asterisk icon ── */
    .card__badge {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card__badge svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* ── Bottom content ── */
    .card__content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 0 20px 14px;
      text-align: center;
    }

    .card__name {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .card__tagline {
      color: rgba(255, 255, 255, 0.88);
      font-size: 12.5px;
      font-weight: 400;
      margin-bottom: 16px;
      letter-spacing: 0.1px;
    }

    /* ── Social icons row ── */
    .card__socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .social-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* ── Bottom strip ── */
    .card__footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 4px;
    }

    .card__footer-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card__footer-logo span {
      color: white;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card__footer-text {
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <div class="phone-wrapper">
    <div class="card">

      <!-- Background photo — troque o src pela sua foto -->
      <img
        class="card__photo"
        src="sua-foto.jpg"
        alt="Emily Comin"
      />

      <!-- Dark gradient overlay -->
      <div class="card__bg"></div>

      <!-- Snowflake badge (top-left) -->
      <div class="card__badge">
        <!-- Asterisk / snowflake SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
      </div>

      <!-- Bottom content -->
      <div class="card__content">

        <p class="card__name">Emily Comin | Social<br/>Media</p>
        <p class="card__tagline">O fim da inconstância no seu perfil!</p>

        <!-- Social icons -->

        </div>

        <!-- Footer strip -->
        <div class="card__footer">
          <div class="card__footer-logo">
            <span>uia</span>
          </div>
          <span class="card__footer-text">Guia de Conteúdos - Crie</span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
